# Template for k8s/secret.yaml — copy this file, fill in real values, and
# save as k8s/secret.yaml. That file is listed in .gitignore and must never
# be committed.
#
# Generate a SECRET_KEY with:
#   python3 -c "import secrets; print(secrets.token_urlsafe(50))"
#
# DATABASE_URL format: postgres://<user>:<password>@<host>:<port>/<dbname>
# In Kubernetes, the Postgres service is named "postgres" (see k8s/postgres/service.yaml),
# so the host is always "postgres" regardless of environment.

apiVersion: v1
kind: Secret
metadata:
  name: timer-secret
  namespace: timer
type: Opaque
stringData:
  # Django backend
  SECRET_KEY: "change-me-generate-with-python-secrets-token-urlsafe-50"
  DATABASE_URL: "postgres://timer:change-me@postgres:5432/timer"

  # PostgreSQL init — must match the credentials embedded in DATABASE_URL above
  POSTGRES_USER: "timer"
  POSTGRES_PASSWORD: "change-me"
  POSTGRES_DB: "timer"
